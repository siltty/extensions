name: Build Extensions
on:
  push:
    branches: [main]
    paths: ['plugins/**', 'scripts/**']
  workflow_dispatch:  # manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            plugins/**/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Auth for private siltty/siltty repo (SDK dependency)
      # 1. Tell cargo to use system git CLI (not libgit2) — needed for auth
      # 2. Configure git to inject token for github.com
      - name: Configure private repo access
        run: |
          mkdir -p ~/.cargo
          echo -e '[net]\ngit-fetch-with-cli = true' >> ~/.cargo/config.toml
          git config --global url."https://x-access-token:${{ secrets.CARGO_GIT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Build all plugins
        run: chmod +x scripts/build-all.sh && scripts/build-all.sh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
